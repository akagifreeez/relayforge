<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RelayForge — Mission Control</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>RelayForge · Mission Control</h1>
  <span id="conn">connecting…</span>
  <span class="spacer hdr-active">active: <b id="active">—</b></span>
</header>
<main>
  <section id="cards"><div class="empty">waiting for telemetry…</div></section>
  <aside>
    <h2>Switch log</h2>
    <div id="log"></div>
  </aside>
</main>
<script src="render.js"></script>
<script>
  const dash = makeDashboard({
    cardsEl: document.getElementById("cards"),
    activeEl: document.getElementById("active"),
    logEl: document.getElementById("log"),
  });
  const connEl = document.getElementById("conn");

  function connect() {
    const es = new EventSource("/events");
    es.onopen = () => { connEl.textContent = "live"; connEl.className = "live"; };
    es.onmessage = (e) => { try { dash.render(JSON.parse(e.data)); } catch (_) {} };
    es.onerror = () => {
      connEl.textContent = "reconnecting…"; connEl.className = "down";
      // EventSource auto-reconnects; the server sends a full snapshot on (re)connect.
    };
  }
  connect();
</script>
</body>
</html>
