<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RelayForge — Mission Control</title>
<style>
  :root { --good:#3ecf6b; --degraded:#e3b341; --dead:#f25c54; --bg:#0d1117; --card:#161b22; --line:#2a3038; --fg:#e6edf3; --dim:#8b949e; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  header { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.3px; }
  #conn { font-size:12px; padding:2px 8px; border-radius:10px; border:1px solid var(--line); color:var(--dim); }
  #conn.live { color:var(--good); border-color:var(--good); }
  #conn.down { color:var(--dead); border-color:var(--dead); }
  main { padding:20px; display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start; }
  #cards { display:flex; flex-direction:column; gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-left-width:4px; border-radius:8px; padding:12px 16px; }
  .card.GOOD { border-left-color:var(--good); }
  .card.DEGRADED { border-left-color:var(--degraded); }
  .card.DEAD { border-left-color:var(--dead); opacity:.7; }
  .card.active { box-shadow:0 0 0 1px #4493f8 inset; }
  .row1 { display:flex; align-items:center; gap:10px; }
  .name { font-size:15px; font-weight:600; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
  .badge.GOOD { background:rgba(62,207,107,.15); color:var(--good); }
  .badge.DEGRADED { background:rgba(227,179,65,.15); color:var(--degraded); }
  .badge.DEAD { background:rgba(242,92,84,.15); color:var(--dead); }
  .active-pill { margin-left:auto; font-size:11px; color:#4493f8; font-weight:600; }
  .metrics { margin-top:8px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px 4px; font-size:12px; color:var(--dim); }
  .metrics b { display:block; color:var(--fg); font-size:14px; font-weight:600; }
  aside h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin:0 0 8px; }
  #log { background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px; height:60vh; overflow:auto; font-size:12px; }
  #log div { padding:2px 0; border-bottom:1px solid #1c2128; }
  #log .t { color:var(--dim); }
  .empty { color:var(--dim); padding:20px; text-align:center; }
</style>
</head>
<body>
<header>
  <h1>RelayForge · Mission Control</h1>
  <span id="conn">connecting…</span>
  <span style="margin-left:auto;color:var(--dim);font-size:12px">active: <b id="active">—</b></span>
</header>
<main>
  <section id="cards"><div class="empty">waiting for telemetry…</div></section>
  <aside>
    <h2>Switch log</h2>
    <div id="log"></div>
  </aside>
</main>
<script>
  const cardsEl = document.getElementById('cards');
  const connEl = document.getElementById('conn');
  const activeEl = document.getElementById('active');
  const logEl = document.getElementById('log');
  let lastActive = undefined;

  function nz(v, suffix='') { return (v === null || v === undefined) ? '—' : (v + suffix); }

  function logSwitch(from, to) {
    const t = new Date().toLocaleTimeString();
    const d = document.createElement('div');
    d.innerHTML = `<span class="t">${t}</span> ACTIVE ${from ?? '∅'} → <b>${to ?? '∅'}</b>`;
    logEl.prepend(d);
  }

  function render(snap) {
    activeEl.textContent = snap.active ?? '—';
    if (lastActive !== undefined && snap.active !== lastActive) logSwitch(lastActive, snap.active);
    lastActive = snap.active;

    if (!snap.links || !snap.links.length) {
      cardsEl.innerHTML = '<div class="empty">no publishers — send streamid=publish:&lt;name&gt;</div>';
      return;
    }
    cardsEl.innerHTML = '';
    for (const l of snap.links) {
      const active = l.name === snap.active;
      const c = document.createElement('div');
      c.className = `card ${l.state}${active ? ' active' : ''}`;
      c.innerHTML = `
        <div class="row1">
          <span class="name">${l.name}</span>
          <span class="badge ${l.state}">${l.state}</span>
          ${active ? '<span class="active-pill">● ACTIVE</span>' : ''}
        </div>
        <div class="metrics">
          <span><b>${nz(l.bitrate_kbps)}</b>kbps</span>
          <span><b>${nz(l.freeze)}</b>freeze</span>
          <span><b>${nz(l.rtt_ms)}</b>rtt ms</span>
          <span><b>${nz(l.loss_pct)}</b>loss %</span>
          <span><b>${nz(l.readers)}</b>readers</span>
          <span><b>${nz(l.uptime_s)}</b>up s</span>
        </div>`;
      cardsEl.appendChild(c);
    }
  }

  function connect() {
    const es = new EventSource('/events');
    es.onopen = () => { connEl.textContent = 'live'; connEl.className = 'live'; };
    es.onmessage = (e) => { try { render(JSON.parse(e.data)); } catch (_) {} };
    es.onerror = () => {
      connEl.textContent = 'reconnecting…'; connEl.className = 'down';
      // EventSource auto-reconnects; server sends a full snapshot on (re)connect.
    };
  }
  connect();
</script>
</body>
</html>
